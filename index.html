<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用ピッチ資料ジェネレーター</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif;background:#f0f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(27,126,196,0.1);padding:36px;max-width:780px;width:100%}
h1{font-size:22px;font-weight:700;color:#1B7EC4;margin-bottom:6px}
.sub{font-size:13px;color:#7A8AAA;margin-bottom:28px}
label{display:block;font-size:13px;font-weight:600;color:#3A4A6A;margin-bottom:6px}
textarea,input[type=text],input[type=password]{width:100%;padding:10px 14px;border:1.5px solid #D0E8F5;border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;background:#F5FBFF}
textarea:focus,input:focus{border-color:#1B7EC4}
textarea{min-height:200px;resize:vertical;line-height:1.6}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.full{grid-column:span 2}
.section{margin-bottom:22px}
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.photo-slot{border:2px dashed #C0DCF0;border-radius:10px;overflow:hidden;cursor:pointer;background:#F5FBFF;transition:border .2s}
.photo-slot:hover{border-color:#1B7EC4}
.photo-slot img{width:100%;height:110px;object-fit:cover;display:block}
.photo-empty{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#A0B8CC;font-size:12px}
.photo-label{padding:6px 10px;font-size:11px;font-weight:600;color:#3A4A6A}
.photo-hint{padding:0 10px 8px;font-size:10px;color:#7A8AAA}
.btn{display:block;width:100%;padding:14px;background:#1B7EC4;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:#1565A0}
.btn:disabled{background:#A0B8CC;cursor:default}
.btn-secondary{background:#fff;color:#1B7EC4;border:2px solid #1B7EC4;margin-top:12px}
.btn-secondary:hover{background:#EAF4FC}
.error{background:#FEF0F0;border:1.5px solid #F5C0C0;border-radius:10px;padding:12px 16px;color:#C0392B;font-size:13px;margin-bottom:16px}
.loading{text-align:center;padding:48px 0}
.loading .spinner{width:44px;height:44px;border:4px solid #D0E8F5;border-top:4px solid #1B7EC4;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#3A4A6A;font-size:14px;font-weight:600;margin-bottom:4px}
.loading small{color:#7A8AAA;font-size:12px}
.done{text-align:center;padding:40px 0}
.done .icon{font-size:52px;margin-bottom:12px}
.done h2{color:#1B7EC4;font-size:20px;margin-bottom:8px}
.done p{color:#7A8AAA;font-size:13px;margin-bottom:20px}
#password-screen{text-align:center}
#password-screen h1{margin-bottom:8px}
#password-screen .pw-input{max-width:280px;margin:20px auto 12px;display:block}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:24px;font-size:12px}
.step{display:flex;align-items:center;gap:5px;color:#7A8AAA}
.step.active{color:#1B7EC4;font-weight:600}
.step-dot{width:22px;height:22px;border-radius:50%;background:#E0EEF8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#7A8AAA}
.step.active .step-dot{background:#1B7EC4;color:#fff}
.step.done-step .step-dot{background:#EAF4FC;color:#1B7EC4;border:1.5px solid #1B7EC4}
.divider{flex:1;height:1px;background:#D0E8F5}
</style>
</head>
<body>
<div class="card">

<!-- パスワード画面 -->
<div id="password-screen">
  <div style="font-size:40px;margin-bottom:12px">📊</div>
  <h1>採用ピッチ資料ジェネレーター</h1>
  <p class="sub">Indeed原稿を貼るだけで採用ピッチ資料を自動生成</p>
  <div id="pw-error" class="error" style="display:none"></div>
  <input type="password" id="pw-input" class="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="btn" style="max-width:280px;margin:0 auto" onclick="checkPw()">ログイン</button>
</div>

<!-- メイン画面 -->
<div id="main-screen" style="display:none">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <div style="font-size:28px">📊</div>
    <div>
      <h1>採用ピッチ資料ジェネレーター</h1>
      <p class="sub">Indeed原稿 → 22スライドPPTX自動生成</p>
    </div>
  </div>

  <div class="step-bar" id="step-bar">
    <div class="step active" id="s1"><div class="step-dot">1</div>情報入力</div>
    <div class="divider"></div>
    <div class="step" id="s2"><div class="step-dot">2</div>解析中</div>
    <div class="divider"></div>
    <div class="step" id="s3"><div class="step-dot">3</div>完了</div>
  </div>

  <div id="error-box" class="error" style="display:none"></div>

  <!-- 入力フォーム -->
  <div id="form-area">
    <div class="section">
      <label>① Indeed求人原稿をそのまま貼り付け <span style="color:#7A8AAA;font-weight:400">（必須）</span></label>
      <textarea id="indeed-text" placeholder="IndeedやAirworkなどの求人ページをコピペしてください..."></textarea>
      <div style="font-size:11px;color:#7A8AAA;margin-top:4px" id="char-count">0文字</div>
    </div>

    <div class="section">
      <label>② ホームページURL <span style="color:#7A8AAA;font-weight:400">（任意）</span></label>
      <input type="text" id="hp-url" placeholder="https://example.com">
    </div>

    <div class="section">
      <label>③ 写真アップロード <span style="color:#7A8AAA;font-weight:400">（任意・追加するとスライドに自動配置）</span></label>
      <div class="photos" id="photo-grid"></div>
    </div>

    <button class="btn" id="gen-btn" onclick="startGenerate()">📥 PPTXを生成してダウンロード</button>
  </div>

  <!-- ローディング -->
  <div id="loading-area" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <p id="loading-msg">求人原稿を解析中...</p>
      <small>20〜40秒ほどかかります</small>
    </div>
  </div>

  <!-- 完了 -->
  <div id="done-area" style="display:none">
    <div class="done">
      <div class="icon">✅</div>
      <h2>ダウンロード完了！</h2>
      <p>PPTXファイルがダウンロードされました。<br>PowerPointまたはGoogleスライドで開いてください。</p>
      <button class="btn" onclick="reset()">別の会社で生成する</button>
    </div>
  </div>
</div>

</div>

<script>
// ── 写真スロット ──
const SLOTS = [
  {id:'cover',  label:'表紙写真',      hint:'オフィス外観・チーム集合'},
  {id:'company',label:'会社概要写真',   hint:'代表者・オフィス内観'},
  {id:'biz1',   label:'事業①写真',    hint:'業務風景・サービス紹介'},
  {id:'biz2',   label:'事業②写真',    hint:'現場・授業風景など'},
  {id:'member', label:'社員インタビュー',hint:'インタビュー対象者'},
  {id:'culture',label:'チーム写真',    hint:'チーム・社内イベント'},
];
const photos = {};

function initPhotoGrid() {
  const grid = document.getElementById('photo-grid');
  SLOTS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'photo-slot';
    div.id = 'slot-'+s.id;
    div.innerHTML = `
      <input type="file" accept="image/*" style="display:none" id="file-${s.id}" onchange="handlePhoto('${s.id}',this)">
      <div class="photo-empty" onclick="document.getElementById('file-${s.id}').click()">
        <span style="font-size:22px">📷</span>
        <span>クリック or ドラッグ</span>
      </div>
      <div class="photo-label">${s.label}</div>
      <div class="photo-hint">${s.hint}</div>`;
    div.addEventListener('dragover', e => e.preventDefault());
    div.addEventListener('drop', e => { e.preventDefault(); handlePhotoFile(s.id, e.dataTransfer.files[0]); });
    grid.appendChild(div);
  });
}

function handlePhoto(id, input) { handlePhotoFile(id, input.files[0]); }
function handlePhotoFile(id, file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    photos[id] = e.target.result;
    const slot = document.getElementById('slot-'+id);
    slot.querySelector('.photo-empty').innerHTML = `<img src="${e.target.result}" style="width:100%;height:110px;object-fit:cover;display:block">`;
  };
  reader.readAsDataURL(file);
}

document.getElementById('indeed-text').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length + '文字';
});

// ── パスワード ──
function checkPw() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  fetch('/api/analyze', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text: 'test', password: pw})
  }).then(r => {
    if (r.status === 401) {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-error').textContent = 'パスワードが違います';
    } else {
      sessionStorage.setItem('pw', pw);
      document.getElementById('password-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      initPhotoGrid();
    }
  }).catch(() => {
    sessionStorage.setItem('pw', pw);
    document.getElementById('password-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    initPhotoGrid();
  });
}

// ── 生成 ──
async function startGenerate() {
  const text = document.getElementById('indeed-text').value.trim();
  const url = document.getElementById('hp-url').value.trim();
  if (!text) { showError('Indeed原稿を貼り付けてください'); return; }

  setStep(2);
  document.getElementById('form-area').style.display = 'none';
  document.getElementById('loading-area').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';

  const pw = sessionStorage.getItem('pw');
  let extracted = null;

  for (let i = 1; i <= 4; i++) {
    if (i > 1) {
      document.getElementById('loading-msg').textContent = `混雑中... リトライ ${i}/4`;
      await sleep(3000 * i);
    }
    try {
      const r = await fetch('/api/analyze', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({text, password: pw})
      });
      const j = await r.json();
      if (j.error && j.error.toLowerCase().includes('overload') && i < 4) continue;
      if (j.error) throw new Error(j.error);
      extracted = j.result;
      break;
    } catch(e) {
      if (i === 4) { showError(e.message); return; }
    }
  }

  document.getElementById('loading-msg').textContent = 'PPTXを生成中...';
  try {
    await makePptx(extracted, url, photos);
    setStep(3);
    document.getElementById('loading-area').style.display = 'none';
    document.getElementById('done-area').style.display = 'block';
  } catch(e) {
    showError('PPTX生成エラー: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('loading-area').style.display = 'none';
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('error-box').style.display = 'block';
  document.getElementById('error-box').textContent = msg;
  setStep(1);
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('s'+i);
    el.className = 'step' + (i === n ? ' active' : i < n ? ' done-step' : '');
    el.querySelector('.step-dot').textContent = i < n ? '✓' : i;
  });
}

function reset() {
  document.getElementById('done-area').style.display = 'none';
  document.getElementById('form-area').style.display = 'block';
  document.getElementById('indeed-text').value = '';
  document.getElementById('hp-url').value = '';
  document.getElementById('char-count').textContent = '0文字';
  Object.keys(photos).forEach(k => delete photos[k]);
  document.getElementById('photo-grid').innerHTML = '';
  initPhotoGrid();
  setStep(1);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── PPTX生成 ──
async function makePptx(e, url, photos) {
  const pres = new PptxGenJS();
  pres.layout = 'LAYOUT_16x9';
  const cn = e.companyName || '会社名';
  const F = 'Yu Gothic';
  const C = { HEADER:'1B7EC4', CYAN:'1E9BC5', DARK:'3A4A6A', GRAY:'7A8AAA', WHITE:'FFFFFF' };

  const sec = (num, title) => {
    const sl = pres.addSlide(); sl.background = {color:'E8F4FA'};
    sl.addShape(pres.shapes.OVAL,{x:5.85,y:0.28,w:3.8,h:3.8,line:{color:'88C4DE',width:2},fill:{color:'B8E0F2',transparency:65}});
    sl.addShape(pres.shapes.OVAL,{x:6.22,y:0.65,w:3.05,h:3.05,line:{color:'68B4D2',width:1.5},fill:{color:C.WHITE,transparency:100}});
    sl.addShape(pres.shapes.RECTANGLE,{x:0.46,y:2.42,w:0.07,h:0.64,fill:{color:C.CYAN},line:{color:C.CYAN}});
    sl.addText(`${String(num).padStart(2,'0')} ${title}`,{x:0.59,y:2.35,w:5,h:0.78,fontSize:22,color:C.DARK,fontFace:F,margin:0});
  };
  const hdr = (sl, num, title) => {
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.52,fill:{color:C.HEADER},line:{color:C.HEADER}});
    sl.addText(`— ${String(num).padStart(2,'0')} ${title}`,{x:0.18,y:0,w:7,h:0.52,fontSize:13,color:C.WHITE,fontFace:F,bold:true,valign:'middle',margin:0});
    sl.addText(cn,{x:7,y:0,w:2.9,h:0.52,fontSize:10,color:C.WHITE,fontFace:F,valign:'middle',align:'right',margin:0});
  };
  const ftr = (sl, pg) => {
    sl.addText(String(pg),{x:0.3,y:5.22,w:0.8,h:0.28,fontSize:9,color:C.GRAY,fontFace:F,margin:0});
    sl.addText(`© ${cn}`,{x:5.5,y:5.22,w:4.2,h:0.28,fontSize:9,color:C.GRAY,fontFace:F,align:'right',margin:0});
  };
  const img = (sl, id, x, y, w, h) => {
    if (photos[id]) sl.addImage({data:photos[id],x,y,w,h,sizing:{type:'cover',w,h}});
  };

  // 1 タイトル
  { const sl=pres.addSlide(); sl.background={color:'0E72A8'};
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:1.1,w:7.2,h:1.0,fill:{color:C.WHITE},line:{color:C.WHITE}});
    sl.addText(cn,{x:0.35,y:1.1,w:6.8,h:1.0,fontSize:26,color:'0E72A8',fontFace:F,bold:true,valign:'middle',margin:5});
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:2.22,w:5.2,h:0.74,fill:{color:C.WHITE},line:{color:C.WHITE}});
    sl.addText('採用ピッチ資料',{x:0.35,y:2.22,w:4.8,h:0.74,fontSize:22,color:'0E72A8',fontFace:F,bold:true,valign:'middle',margin:5});
    if(url) sl.addText(url,{x:0.35,y:3.08,w:4.5,h:0.38,fontSize:12,color:'88CCDE',fontFace:F});
    img(sl,'cover',6.8,0,3.2,5.625);
    sl.addText(`© ${cn}`,{x:0.3,y:5.25,w:5,h:0.3,fontSize:9,color:'6ABBD8',fontFace:F}); }

  // 2 目次
  { const sl=pres.addSlide(); sl.background={color:'F2F9FD'};
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:0.1,h:5.625,fill:{color:'B0D8EE'},line:{color:'B0D8EE'}});
    sl.addText('目\n次',{x:0.15,y:0.6,w:0.62,h:1.5,fontSize:13,color:C.CYAN,fontFace:F,bold:true,align:'center'});
    ['会社概要','組織','事業紹介','評価・報酬制度','カルチャー','働き方・制度'].forEach((s,i)=>
      sl.addText(`${String(i+1).padStart(2,'0')}   ${s}`,{x:0.88,y:0.55+i*0.77,w:5.5,h:0.65,fontSize:19,color:C.DARK,fontFace:F})); }

  sec(1,'会社概要');

  // 4 会社概要
  { const sl=pres.addSlide(); sl.background={color:'F5FBFF'}; hdr(sl,'01','会社概要');
    const rows=[['社名',e.companyName],['所在地',e.address],['代表者',e.ceo],['設立',e.founded],['従業員',e.employees],['売上高',e.sales],['事業内容',e.business],['HP',url]].filter(r=>r[1]);
    rows.forEach(([k,v],i)=>{
      sl.addText(k,{x:0.5,y:0.7+i*0.58,w:1.3,h:0.48,fontSize:11,color:C.GRAY,fontFace:F,valign:'middle',margin:0});
      sl.addShape(pres.shapes.LINE,{x:0.5,y:1.11+i*0.58,w:5.8,h:0,line:{color:'E0EEF8',width:0.5}});
      sl.addText(v,{x:1.95,y:0.7+i*0.58,w:4.3,h:0.48,fontSize:11,color:C.DARK,fontFace:F,valign:'middle',margin:0});});
    img(sl,'company',6.7,0.6,3.0,4.7); ftr(sl,4); }

  // 5 ミッション
  { const sl=pres.addSlide(); sl.background={color:C.WHITE};
    sl.addText(e.mission||'',{x:0.5,y:0.3,w:9,h:2.0,fontSize:24,color:C.CYAN,fontFace:F,lineSpacingMultiple:1.4});
    if(e.missionEn) sl.addText(`"${e.missionEn}"`,{x:0.5,y:2.05,w:8.5,h:0.45,fontSize:13,color:C.GRAY,fontFace:'Arial',italic:true});
    sl.addText(e.missionDesc||'',{x:0.5,y:2.62,w:9,h:2.8,fontSize:12.5,color:C.DARK,fontFace:F,lineSpacingMultiple:1.65}); }

  sec(2,'組織（職種・構成など）');

  // 7 組織
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'02','組織');
    // ルール：データのあるカードのみ表示し中央寄せ
    const orgCards = [[e.employees,'従業員数'],[e.founded,'設立'],[e.ceo,'代表者']].filter(([n])=>n&&n.trim());
    const cardW=2.8, cardGap=0.35;
    const orgTotalW = orgCards.length*cardW + (orgCards.length-1)*cardGap;
    const orgStartX = (9.6-orgTotalW)/2;
    orgCards.forEach(([n,l],i)=>{
      const x=orgStartX+i*(cardW+cardGap);
      sl.addShape(pres.shapes.RECTANGLE,{x,y:0.72,w:cardW,h:1.55,fill:{color:'EAF5FB'},line:{color:'C0DCF0'}});
      sl.addText(n,{x,y:0.78,w:cardW,h:0.75,fontSize:20,color:C.CYAN,fontFace:F,bold:true,align:'center',valign:'middle',margin:0});
      sl.addText(l,{x,y:1.45,w:cardW,h:0.35,fontSize:12,color:C.DARK,fontFace:F,bold:true,align:'center',margin:0});});
    sl.addShape(pres.shapes.RECTANGLE,{x:7.1,y:0.72,w:2.6,h:3.2,fill:{color:'EAF5FB'},line:{color:'C0DCF0'}});
    sl.addText('求める人物像',{x:7.2,y:0.82,w:2.4,h:0.3,fontSize:11,color:C.DARK,fontFace:F,bold:true,margin:0});
    (e.wantedList||[]).slice(0,5).forEach((v,i)=>sl.addText('・'+v,{x:7.2,y:1.22+i*0.42,w:2.4,h:0.38,fontSize:10,color:C.DARK,fontFace:F,margin:0}));
    img(sl,'culture',0.4,2.45,6.5,2.75); ftr(sl,7); }

  sec(3,'事業紹介');

  // 9 事業概要
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'03','事業紹介');
    sl.addShape(pres.shapes.RECTANGLE,{x:0.4,y:0.62,w:9.2,h:0.55,fill:{color:'D2EBF6'},line:{color:'B5DCEE'}});
    sl.addText(e.bizHeadline||'',{x:0.4,y:0.62,w:9.2,h:0.55,fontSize:15,color:C.DARK,fontFace:F,bold:true,align:'center',valign:'middle'});
    [{x:0.3,y:1.28},{x:5.1,y:1.28},{x:0.3,y:3.3},{x:5.1,y:3.3}].forEach((p,i)=>{
      const s=(e.services||[])[i]; if(!s)return;
      sl.addText(s.title,{x:p.x,y:p.y,w:4.6,h:0.44,fontSize:14,color:C.CYAN,fontFace:F,bold:true,margin:0});
      sl.addText(s.desc,{x:p.x,y:p.y+0.46,w:4.6,h:1.5,fontSize:10.5,color:C.DARK,fontFace:F,lineSpacingMultiple:1.35});});
    ftr(sl,9); }

  // 10 事業詳細1
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'03','事業紹介');
    sl.addShape(pres.shapes.RECTANGLE,{x:0.3,y:0.62,w:5.2,h:0.55,fill:{color:'D2EBF6'},line:{color:'B5DCEE'}});
    sl.addShape(pres.shapes.OVAL,{x:0.38,y:0.72,w:0.24,h:0.24,fill:{color:C.HEADER},line:{color:C.HEADER}});
    sl.addText(e.biz1Title||'',{x:0.68,y:0.62,w:4.7,h:0.55,fontSize:14,color:C.DARK,fontFace:F,bold:true,valign:'middle',margin:0});
    sl.addText(e.biz1Body||'',{x:0.3,y:1.28,w:5.8,h:3.75,fontSize:13,color:C.DARK,fontFace:F,lineSpacingMultiple:1.65});
    img(sl,'biz1',6.3,0.62,3.4,4.2); ftr(sl,10); }

  // 11 事業詳細2（ルール：biz2TitleとBiz2Bodyが両方ある場合のみ生成）
  if(e.biz2Title && e.biz2Body) {
    const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'03','事業紹介');
    sl.addShape(pres.shapes.RECTANGLE,{x:0.3,y:0.62,w:3.8,h:0.55,fill:{color:'D2EBF6'},line:{color:'B5DCEE'}});
    sl.addShape(pres.shapes.OVAL,{x:0.38,y:0.72,w:0.24,h:0.24,fill:{color:C.HEADER},line:{color:C.HEADER}});
    sl.addText(e.biz2Title,{x:0.68,y:0.62,w:3.3,h:0.55,fontSize:14,color:C.DARK,fontFace:F,bold:true,valign:'middle',margin:0});
    sl.addText(e.biz2Body,{x:0.3,y:1.28,w:5.8,h:3.75,fontSize:13,color:C.DARK,fontFace:F,lineSpacingMultiple:1.65});
    img(sl,'biz2',6.3,0.62,3.4,4.2); ftr(sl,11);}

  sec(4,'評価・報酬制度');

  // 13 報酬
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'04','評価・報酬制度');
    sl.addShape(pres.shapes.RECTANGLE,{x:0.4,y:0.62,w:9.2,h:0.55,fill:{color:'D2EBF6'},line:{color:'B5DCEE'}});
    sl.addText('成果と経験に応じた明確な報酬体系',{x:0.4,y:0.62,w:9.2,h:0.55,fontSize:15,color:C.DARK,fontFace:F,bold:true,align:'center',valign:'middle'});
    (e.salaryFactors||[]).slice(0,3).forEach((f,i)=>{
      const y=1.4+i*1.1;
      sl.addShape(pres.shapes.OVAL,{x:0.28,y,w:1.2,h:0.88,fill:{color:C.CYAN},line:{color:C.CYAN}});
      sl.addText(f.name,{x:0.28,y,w:1.2,h:0.88,fontSize:11,color:C.WHITE,fontFace:F,bold:true,align:'center',valign:'middle'});
      sl.addShape(pres.shapes.RECTANGLE,{x:1.6,y:y+0.05,w:8.0,h:0.78,fill:{color:'EAF4FB'},line:{color:'C0DCF0'}});
      sl.addText('● '+f.desc,{x:1.7,y:y+0.05,w:7.8,h:0.78,fontSize:11.5,color:C.DARK,fontFace:F,valign:'middle'});});
    ftr(sl,13); }

  // 14 キャリアパス
  { const sl=pres.addSlide(); sl.background={color:'F5FAFF'}; hdr(sl,'04','評価・報酬制度');
    sl.addText('キャリアパス',{x:0.3,y:0.62,w:9.4,h:0.45,fontSize:17,color:C.DARK,fontFace:F,bold:true,align:'center'});
    sl.addShape(pres.shapes.LINE,{x:0.88,y:1.18,w:0,h:3.9,line:{color:C.CYAN,width:2}});
    const cols=['8FCAE8','4A9FD4','1B7EC4','0D5FA0'];
    (e.careerPath||[]).slice(0,4).forEach((s,i)=>{
      const y=1.12+i*0.98;
      sl.addShape(pres.shapes.OVAL,{x:0.65,y:y+0.1,w:0.46,h:0.46,fill:{color:cols[i]},line:{color:cols[i]}});
      sl.addShape(pres.shapes.RECTANGLE,{x:1.28,y,w:8.4,h:0.86,fill:{color:'F0F7FF'},line:{color:'C8E0F2'}});
      sl.addText(s.title,{x:1.38,y:y+0.04,w:4.5,h:0.34,fontSize:13,color:C.DARK,fontFace:F,bold:true,margin:0});
      sl.addText(s.period,{x:5.9,y:y+0.04,w:1.6,h:0.34,fontSize:10,color:C.GRAY,fontFace:F,margin:0});
      const salLabel = s.salary && /^\d+$/.test(s.salary.trim()) ? s.salary+'万円' : (s.salary||'');
      sl.addText(salLabel,{x:7.6,y:y+0.04,w:2.0,h:0.34,fontSize:11,color:C.CYAN,fontFace:F,bold:true,align:'right',margin:0});
      sl.addText(s.desc,{x:1.38,y:y+0.46,w:8.2,h:0.34,fontSize:10,color:C.GRAY,fontFace:F,margin:0});});
    ftr(sl,14); }

  // 15 年収実績
  { const sl=pres.addSlide(); sl.background={color:C.WHITE}; hdr(sl,'04','評価・報酬制度');
    sl.addText('年収レンジ・実績',{x:0.4,y:0.65,w:6,h:0.4,fontSize:15,color:C.DARK,fontFace:F,bold:true});
    const examples = (e.salaryExamples || []).filter(ex => parseInt(ex.amount) > 0);
    const top=1.18,ch=3.5;
    // ルール：データ2件以上でグラフ表示。1件以下はレンジのみ表示
    if(examples.length >= 2) {
      const maxVal = Math.max(...examples.map(ex => parseInt(ex.amount)||0)) * 1.15 || 1000;
      const cols2 = ['A8D8F0','4A9FD4','0D5FA0'];
      const barW = 1.5, gap = 2.0;
      // ルール：バー数に応じて中央寄せ
      const totalW = examples.slice(0,3).length * barW + (examples.slice(0,3).length-1) * (gap-barW);
      const startX = (6.3 - totalW) / 2 + 0.5;
      examples.slice(0,3).forEach((ex,i)=>{
        const v=parseInt(ex.amount)||0, x=startX+i*gap, bh=v/maxVal*ch, by=top+ch-bh;
        sl.addShape(pres.shapes.RECTANGLE,{x,y:by,w:barW,h:bh,fill:{color:cols2[i]},line:{color:cols2[i]}});
        sl.addText(`${v}万円`,{x:x-0.1,y:by-0.4,w:barW+0.2,h:0.38,fontSize:14,color:C.DARK,fontFace:F,bold:true,align:'center',margin:0});
        sl.addText(ex.label,{x:x-0.1,y:top+ch+0.1,w:barW+0.2,h:0.45,fontSize:10,color:C.GRAY,fontFace:F,align:'center'});});
      sl.addShape(pres.shapes.LINE,{x:0.5,y:top+ch,w:6.3,h:0,line:{color:'D0E8F5',width:1}});
    }
    sl.addShape(pres.shapes.RECTANGLE,{x:7.0,y:0.88,w:2.7,h:3.8,fill:{color:'EAF5FB'},line:{color:'C0DCF0'}});
    sl.addText(e.salaryUnit==='年俸'?'年俸レンジ':'月給レンジ',{x:7.1,y:1.05,w:2.5,h:0.35,fontSize:13,color:C.DARK,fontFace:F,bold:true,align:'center'});
    const sMin=parseInt(e.salaryMin)||0, sMax=parseInt(e.salaryMax)||0;
    if(sMin&&sMax){
      sl.addText(`${sMin}〜`,{x:7.1,y:1.55,w:2.5,h:0.65,fontSize:28,color:C.CYAN,fontFace:F,bold:true,align:'center'});
      sl.addText(`${sMax}万円`,{x:7.1,y:2.2,w:2.5,h:0.55,fontSize:22,color:C.CYAN,fontFace:F,bold:true,align:'center'});}
    sl.addShape(pres.shapes.LINE,{x:7.2,y:2.88,w:2.3,h:0,line:{color:'C0DCF0',width:0.5}});
    const noteLines = ['賞与・昇給','固定残業代含む','※詳細は面接時確認'];
    noteLines.forEach((t,i)=>sl.addText(t,{x:7.1,y:2.98+i*0.35,w:2.5,h:0.32,fontSize:10,color:C.GRAY,fontFace:F,align:'center'}));
    ftr(sl,15); }

  sec(5,'カルチャー');

  // 17 カルチャー（ルール：円右端1.8+余白0.4=テキストx:2.2）
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'05','カルチャー');
    sl.addText(`${e.cultureVal1||''}　×　${e.cultureVal2||''}`,{x:0.4,y:0.65,w:9.2,h:0.62,fontSize:20,color:C.DARK,fontFace:F,bold:true,align:'center'});
    sl.addShape(pres.shapes.OVAL,{x:0.1,y:1.2,w:1.7,h:1.7,fill:{color:'A8D8F0',transparency:35},line:{color:C.CYAN,width:2}});
    sl.addText(e.cultureVal1||'',{x:0.1,y:1.2,w:1.7,h:1.7,fontSize:12,color:C.DARK,fontFace:F,bold:true,align:'center',valign:'middle'});
    sl.addShape(pres.shapes.OVAL,{x:0.1,y:3.05,w:1.7,h:1.7,fill:{color:'B0E4F8',transparency:35},line:{color:C.CYAN,width:2}});
    sl.addText(e.cultureVal2||'',{x:0.1,y:3.05,w:1.7,h:1.7,fontSize:12,color:C.DARK,fontFace:F,bold:true,align:'center',valign:'middle'});
    sl.addText(e.cultureDesc||'',{x:2.2,y:1.15,w:7.5,h:3.8,fontSize:12.5,color:C.DARK,fontFace:F,lineSpacingMultiple:1.75});
    ftr(sl,17); }

  // 18 社員インタビュー（ルール：Q(0.32)+A(0.72)+gap(0.2)=1.24/block）
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'05','カルチャー');
    sl.addText('社員の声',{x:0.4,y:0.65,w:9,h:0.42,fontSize:18,color:C.DARK,fontFace:F,bold:true,align:'center'});
    sl.addShape(pres.shapes.RECTANGLE,{x:0.35,y:1.15,w:9.3,h:4.1,fill:{color:'F0F8FF'},line:{color:'C0DCF0'}});
    img(sl,'member',0.45,1.28,1.5,1.5);
    const iv=e.interview||{};
    sl.addText(iv.person||'',{x:0.45,y:2.84,w:1.5,h:0.28,fontSize:9,color:C.GRAY,fontFace:F,align:'center'});
    // 各ブロック: Q@qy(h:0.32) A@qy+0.35(h:0.72) → 終了qy+1.07。次block=qy+1.27
    // Q(h:0.28)+A(h:0.8)+gap(0.15)=1.23/block。3blocks=3.69。開始1.28。終了4.97。BOX終了5.25でOK
    [{q:iv.q1,a:iv.a1,qy:1.28},{q:iv.q2,a:iv.a2,qy:2.51},{q:iv.q3,a:iv.a3,qy:3.74}].forEach(b=>{
      if(!b.q)return;
      sl.addText(b.q,{x:2.1,y:b.qy,w:7.5,h:0.28,fontSize:11.5,color:C.CYAN,fontFace:F,bold:true,margin:0});
      sl.addText(b.a||'',{x:2.1,y:b.qy+0.3,w:7.5,h:0.78,fontSize:10.5,color:C.DARK,fontFace:F,lineSpacingMultiple:1.35});});
    ftr(sl,18); }

  // 19 こんな方と
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'05','カルチャー');
    sl.addText('こんな方と働きたい',{x:0.4,y:0.65,w:9,h:0.55,fontSize:20,color:C.CYAN,fontFace:F,bold:true,align:'center'});
    (e.wantedList||[]).slice(0,5).forEach((v,i)=>{
      sl.addShape(pres.shapes.RECTANGLE,{x:1.2,y:1.38+i*0.75,w:7.6,h:0.6,fill:{color:'EAF5FB'},line:{color:'C0DCF0'}});
      sl.addShape(pres.shapes.RECTANGLE,{x:1.2,y:1.38+i*0.75,w:0.08,h:0.6,fill:{color:C.CYAN},line:{color:C.CYAN}});
      sl.addText(v,{x:1.45,y:1.38+i*0.75,w:7.2,h:0.6,fontSize:14,color:C.DARK,fontFace:F,valign:'middle',margin:0});});
    ftr(sl,19); }

  sec(6,'働き方・制度');

  // 21 働き方
  { const sl=pres.addSlide(); sl.background={color:'EEF7FC'}; hdr(sl,'06','働き方・制度');
    // 就業時間の内容が長い場合を考慮してfontSize:9.5、行間1.3
    // ラインは各セクションタイトルの右側のみ（テキストと被らない位置）
    [['就業時間',e.workHours||''],['勤務地',e.workLocation||''],['休暇・休日',(e.holidays||[]).join('\n')]].forEach((s,i)=>{
      const y=0.65+i*1.52;
      sl.addShape(pres.shapes.OVAL,{x:0.35,y:y+0.08,w:0.25,h:0.25,fill:{color:C.HEADER},line:{color:C.HEADER}});
      sl.addText(s[0],{x:0.68,y,w:1.5,h:0.38,fontSize:13,color:C.DARK,fontFace:F,bold:true,margin:0});
      sl.addShape(pres.shapes.LINE,{x:2.3,y:y+0.2,w:2.6,h:0,line:{color:'C0DCF0',width:0.8}});
      sl.addText(s[1],{x:0.68,y:y+0.4,w:4.3,h:1.0,fontSize:9.5,color:C.DARK,fontFace:F,lineSpacingMultiple:1.3});});
    sl.addShape(pres.shapes.OVAL,{x:5.15,y:0.73,w:0.25,h:0.25,fill:{color:C.HEADER},line:{color:C.HEADER}});
    sl.addText('福利厚生',{x:5.47,y:0.65,w:4,h:0.38,fontSize:13,color:C.DARK,fontFace:F,bold:true,margin:0});
    sl.addShape(pres.shapes.LINE,{x:6.25,y:0.85,w:3.35,h:0,line:{color:'C0DCF0',width:0.8}});
    (e.benefits||[]).slice(0,7).forEach((b,i)=>sl.addText('・'+b,{x:5.15,y:1.1+i*0.38,w:4.55,h:0.35,fontSize:11,color:C.DARK,fontFace:F,margin:0}));
    ftr(sl,21); }

  await pres.writeFile({fileName:`${cn}_採用ピッチ資料.pptx`});
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') checkPw();
});
</script>
