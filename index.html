<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用ピッチ資料ジェネレーター</title>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif;background:#f0f7ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(27,126,196,0.1);padding:36px;max-width:780px;width:100%}
h1{font-size:22px;font-weight:700;color:#1B7EC4;margin-bottom:6px}
.sub{font-size:13px;color:#7A8AAA;margin-bottom:28px}
label{display:block;font-size:13px;font-weight:600;color:#3A4A6A;margin-bottom:6px}
textarea,input[type=text],input[type=password]{width:100%;padding:10px 14px;border:1.5px solid #D0E8F5;border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;background:#F5FBFF}
textarea:focus,input:focus{border-color:#1B7EC4}
textarea{min-height:200px;resize:vertical;line-height:1.6}
.section{margin-bottom:22px}
.photos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.photo-slot{border:2px dashed #C0DCF0;border-radius:10px;overflow:hidden;cursor:pointer;background:#F5FBFF;transition:border .2s}
.photo-slot:hover{border-color:#1B7EC4}
.photo-slot img{width:100%;height:110px;object-fit:cover;display:block}
.photo-empty{height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#A0B8CC;font-size:12px}
.photo-label{padding:6px 10px;font-size:11px;font-weight:600;color:#3A4A6A}
.photo-hint{padding:0 10px 8px;font-size:10px;color:#7A8AAA}
.btn{display:block;width:100%;padding:14px;background:#1B7EC4;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:8px}
.btn:hover{background:#1565A0}
.error{background:#FEF0F0;border:1.5px solid #F5C0C0;border-radius:10px;padding:12px 16px;color:#C0392B;font-size:13px;margin-bottom:16px}
.loading{text-align:center;padding:48px 0}
.loading .spinner{width:44px;height:44px;border:4px solid #D0E8F5;border-top:4px solid #1B7EC4;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#3A4A6A;font-size:14px;font-weight:600;margin-bottom:4px}
.loading small{color:#7A8AAA;font-size:12px}
.done{text-align:center;padding:40px 0}
.done .icon{font-size:52px;margin-bottom:12px}
.done h2{color:#1B7EC4;font-size:20px;margin-bottom:8px}
.done p{color:#7A8AAA;font-size:13px;margin-bottom:20px}
#password-screen{text-align:center}
#password-screen h1{margin-bottom:8px}
#password-screen .pw-input{max-width:280px;margin:20px auto 12px;display:block}
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:24px;font-size:12px}
.step{display:flex;align-items:center;gap:5px;color:#7A8AAA}
.step.active{color:#1B7EC4;font-weight:600}
.step-dot{width:22px;height:22px;border-radius:50%;background:#E0EEF8;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#7A8AAA}
.step.active .step-dot{background:#1B7EC4;color:#fff}
.step.done-step .step-dot{background:#EAF4FC;color:#1B7EC4;border:1.5px solid #1B7EC4}
.divider{flex:1;height:1px;background:#D0E8F5}
.hearing-box{text-align:left;margin:20px 0;background:#F0F8FF;border-radius:12px;padding:16px;border:1.5px solid #C0DCF0}
.hearing-box .hearing-title{font-size:13px;font-weight:700;color:#1B7EC4;margin-bottom:10px}
.hearing-box li{list-style:none;padding:7px 0;border-bottom:1px solid #D8EEF8;font-size:12px;color:#3A4A6A;line-height:1.5}
.hearing-box li:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="card">
<div id="password-screen">
  <div style="font-size:40px;margin-bottom:12px">📊</div>
  <h1>採用ピッチ資料ジェネレーター</h1>
  <p class="sub">Indeed原稿を貼るだけで採用ピッチ資料を自動生成</p>
  <div id="pw-error" class="error" style="display:none"></div>
  <input type="password" id="pw-input" class="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="btn" style="max-width:280px;margin:0 auto" onclick="checkPw()">ログイン</button>
</div>
<div id="main-screen" style="display:none">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <div style="font-size:28px">📊</div>
    <div><h1>採用ピッチ資料ジェネレーター</h1><p class="sub">Indeed原稿 → 22スライドPPTX自動生成</p></div>
  </div>
  <div class="step-bar" id="step-bar">
    <div class="step active" id="s1"><div class="step-dot">1</div>情報入力</div>
    <div class="divider"></div>
    <div class="step" id="s2"><div class="step-dot">2</div>解析中</div>
    <div class="divider"></div>
    <div class="step" id="s3"><div class="step-dot">3</div>完了</div>
  </div>
  <div id="error-box" class="error" style="display:none"></div>
  <div id="form-area">
    <div class="section">
      <label>① Indeed求人原稿をそのまま貼り付け <span style="color:#7A8AAA;font-weight:400">（必須）</span></label>
      <textarea id="indeed-text" placeholder="IndeedやAirworkなどの求人ページをコピペしてください..."></textarea>
      <div style="font-size:11px;color:#7A8AAA;margin-top:4px" id="char-count">0文字</div>
    </div>
    <div class="section">
      <label>② ホームページURL <span style="color:#7A8AAA;font-weight:400">（任意）</span></label>
      <input type="text" id="hp-url" placeholder="https://example.com">
    </div>
    <div class="section">
      <label>③ 写真アップロード <span style="color:#7A8AAA;font-weight:400">（任意）</span></label>
      <div class="photos" id="photo-grid"></div>
    </div>
    <button class="btn" id="gen-btn" onclick="startGenerate()">📥 PPTXを生成してダウンロード</button>
  </div>
  <div id="loading-area" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <p id="loading-msg">求人原稿を解析中...</p>
      <small>20〜40秒ほどかかります</small>
    </div>
  </div>
  <div id="done-area" style="display:none">
    <div class="done">
      <div class="icon">✅</div>
      <h2>ダウンロード完了！</h2>
      <p>PPTXファイルがダウンロードされました。<br>PowerPointまたはGoogleスライドで開いてください。</p>
      <div id="hearing-section" class="hearing-box" style="display:none">
        <div class="hearing-title">📋 次回ヒアリングで確認するとさらに充実した資料になります</div>
        <ul id="hearing-list"></ul>
      </div>
      <button class="btn" onclick="reset()">別の会社で生成する</button>
    </div>
  </div>
</div>
</div>
<script>
const SLOTS=[{id:'cover',label:'表紙写真',hint:'オフィス外観・チーム集合'},{id:'company',label:'会社概要写真',hint:'代表者・オフィス内観'},{id:'biz1',label:'事業①写真',hint:'業務風景・サービス紹介'},{id:'biz2',label:'事業②写真',hint:'現場・授業風景など'},{id:'member',label:'社員インタビュー',hint:'インタビュー対象者'},{id:'culture',label:'チーム写真',hint:'チーム・社内イベント'}];
const photos={};
function initPhotoGrid(){
  const grid=document.getElementById('photo-grid');
  SLOTS.forEach(s=>{
    const div=document.createElement('div');
    div.className='photo-slot';div.id='slot-'+s.id;
    div.innerHTML=`<input type="file" accept="image/*" style="display:none" id="file-${s.id}" onchange="handlePhoto('${s.id}',this)"><div class="photo-empty" onclick="document.getElementById('file-${s.id}').click()"><span style="font-size:22px">📷</span><span>クリック or ドラッグ</span></div><div class="photo-label">${s.label}</div><div class="photo-hint">${s.hint}</div>`;
    div.addEventListener('dragover',e=>e.preventDefault());
    div.addEventListener('drop',e=>{e.preventDefault();handlePhotoFile(s.id,e.dataTransfer.files[0]);});
    grid.appendChild(div);
  });
}
function handlePhoto(id,input){handlePhotoFile(id,input.files[0]);}
function handlePhotoFile(id,file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=e=>{photos[id]=e.target.result;document.getElementById('slot-'+id).querySelector('.photo-empty').innerHTML=`<img src="${e.target.result}" style="width:100%;height:110px;object-fit:cover;display:block">`;};
  reader.readAsDataURL(file);
}
document.getElementById('indeed-text').addEventListener('input',function(){document.getElementById('char-count').textContent=this.value.length+'文字';});
function checkPw(){
  const pw=document.getElementById('pw-input').value;if(!pw)return;
  fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'test',password:pw})})
  .then(r=>{
    if(r.status===401){document.getElementById('pw-error').style.display='block';document.getElementById('pw-error').textContent='パスワードが違います';}
    else{sessionStorage.setItem('pw',pw);document.getElementById('password-screen').style.display='none';document.getElementById('main-screen').style.display='block';initPhotoGrid();}
  }).catch(()=>{sessionStorage.setItem('pw',pw);document.getElementById('password-screen').style.display='none';document.getElementById('main-screen').style.display='block';initPhotoGrid();});
}
async function startGenerate(){
  const text=document.getElementById('indeed-text').value.trim();
  const url=document.getElementById('hp-url').value.trim();
  if(!text){showError('Indeed原稿を貼り付けてください');return;}
  setStep(2);document.getElementById('form-area').style.display='none';document.getElementById('loading-area').style.display='block';document.getElementById('error-box').style.display='none';
  const pw=sessionStorage.getItem('pw');let extracted=null;
  for(let i=1;i<=4;i++){
    if(i>1){document.getElementById('loading-msg').textContent=`混雑中... リトライ ${i}/4`;await sleep(3000*i);}
    try{
      const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,password:pw})});
      const j=await r.json();
      if(j.error&&j.error.toLowerCase().includes('overload')&&i<4)continue;
      if(j.error)throw new Error(j.error);
      extracted=j.result;break;
    }catch(e){if(i===4){showError(e.message);return;}}
  }
  document.getElementById('loading-msg').textContent='PPTXを生成中...';
  try{await makePptx(extracted,url,photos);showHearingSuggestions(extracted,photos);setStep(3);document.getElementById('loading-area').style.display='none';document.getElementById('done-area').style.display='block';}
  catch(e){showError('PPTX生成エラー: '+e.message);}
}
function showHearingSuggestions(e,photos){
  const s=[];
  const iv=e.interview||{};
  if(!iv.q1&&!iv.q2&&!iv.q3)s.push('📝 社員インタビュー（Q&A形式・3問）→「社員の声」スライドが生成されます');
  if((e.salaryExamples||[]).filter(ex=>parseInt(ex.amount)>0).length<2)s.push('💰 年収実績例（3名分：役職名＋年収額）→ 年収グラフが追加されます');
  if((e.careerPath||[]).filter(x=>x&&x.title&&x.title.trim()).length<3)s.push('📈 キャリアパス（3〜4ステップ：役割・年収・期間）→ キャリアが見える化されます');
  if(!e.biz2Title||!e.biz2Body)s.push('🏢 事業②の詳細説明（タイトル＋本文）→ 事業紹介スライドが1枚追加されます');
  if((e.salaryFactors||[]).filter(f=>f.name&&f.name.trim()&&f.desc&&f.desc.trim()).length<3)s.push('💼 報酬制度の詳細（手当・インセンティブ・昇給ルール等）→ 報酬スライドが充実します');
  if(!photos.member)s.push('📷 社員インタビュー写真（インタビュー対象者）→ 社員の声スライドが充実します');
  if(!photos.cover)s.push('📷 表紙写真（オフィス外観・チーム集合）→ 第一印象が向上します');
  if(!photos.culture)s.push('📷 チーム写真（チーム・社内イベント）→ カルチャースライドが充実します');
  if(s.length===0)return;
  document.getElementById('hearing-list').innerHTML=s.map(x=>`<li>${x}</li>`).join('');
  document.getElementById('hearing-section').style.display='block';
}
function showError(msg){document.getElementById('loading-area').style.display='none';document.getElementById('form-area').style.display='block';document.getElementById('error-box').style.display='block';document.getElementById('error-box').textContent=msg;setStep(1);}
function setStep(n){[1,2,3].forEach(i=>{const el=document.getElementById('s'+i);el.className='step'+(i===n?' active':i<n?' done-step':'');el.querySelector('.step-dot').textContent=i<n?'✓':i;});}
function reset(){document.getElementById('done-area').style.display='none';document.getElementById('form-area').style.display='block';document.getElementById('indeed-text').value='';document.getElementById('hp-url').value='';document.getElementById('char-count').textContent='0文字';Object.keys(photos).forEach(k=>delete photos[k]);document.getElementById('photo-grid').innerHTML='';document.getElementById('hearing-section').style.display='none';document.getElementById('hearing-list').innerHTML='';initPhotoGrid();setStep(1);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function makePptx(e,url,photos){
  const pres=new PptxGenJS();pres.layout='LAYOUT_16x9';
  const cn=e.companyName||'会社名';const F='Yu Gothic';
  const C={
    NAVY:'1A2B4A',NAVY2:'1E3357',BLUE:'1B7EC4',CYAN:'0EA5D4',
    TEXT:'1E293B',GRAY:'64748B',LGRAY:'94A3B8',WHITE:'FFFFFF',
    BG:'F8FAFC',CARD:'FFFFFF',BORDER:'E2E8F0',ACCENT:'EFF6FF'
  };

  // セクション区切り（ダーク・スタイリッシュ）
  const sec=(num,title)=>{
    const sl=pres.addSlide();sl.background={color:C.NAVY};
    sl.addText(String(num).padStart(2,'0'),{x:4.8,y:-0.2,w:5.5,h:6.0,fontSize:210,color:C.NAVY2,fontFace:F,bold:true,align:'center',valign:'middle'});
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:0.07,h:5.625,fill:{color:C.BLUE},line:{color:C.BLUE}});
    sl.addText('0'+num,{x:0.3,y:1.55,w:1.5,h:0.45,fontSize:11,color:C.BLUE,fontFace:F,bold:true});
    sl.addShape(pres.shapes.LINE,{x:0.3,y:2.1,w:3.0,h:0,line:{color:'2A4070',width:1}});
    sl.addText(title,{x:0.3,y:2.25,w:5.8,h:2.0,fontSize:28,color:C.WHITE,fontFace:F,bold:true,lineSpacingMultiple:1.3});
  };

  // ヘッダー（ネイビー帯＋ブルーライン）
  const hdr=(sl,num,title)=>{
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.50,fill:{color:C.NAVY},line:{color:C.NAVY}});
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:0.07,h:0.50,fill:{color:C.BLUE},line:{color:C.BLUE}});
    sl.addText(String(num).padStart(2,'0')+'  '+title,{x:0.2,y:0,w:7,h:0.50,fontSize:12,color:C.WHITE,fontFace:F,bold:true,valign:'middle'});
    sl.addText(cn,{x:7,y:0,w:2.9,h:0.50,fontSize:9,color:'7AAAC8',fontFace:F,valign:'middle',align:'right'});
  };

  // フッター
  const ftr=(sl,pg)=>{
    sl.addShape(pres.shapes.LINE,{x:0.3,y:5.18,w:9.4,h:0,line:{color:C.BORDER,width:0.5}});
    sl.addText(String(pg),{x:0.3,y:5.23,w:0.8,h:0.28,fontSize:8,color:C.LGRAY,fontFace:F});
    sl.addText('© '+cn,{x:5.5,y:5.23,w:4.2,h:0.28,fontSize:8,color:C.LGRAY,fontFace:F,align:'right'});
  };

  // 画像
  const img=(sl,id,x,y,w,h)=>{if(photos[id])sl.addImage({data:photos[id],x,y,w,h,sizing:{type:'cover',w,h}});};

  // ── 1. タイトル ──
  {const sl=pres.addSlide();sl.background={color:C.NAVY};
    img(sl,'cover',4.8,0,5.2,5.625);
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:5.4,h:5.625,fill:{color:C.NAVY},line:{color:C.NAVY}});
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:0.07,h:5.625,fill:{color:C.BLUE},line:{color:C.BLUE}});
    sl.addText(cn,{x:0.35,y:1.3,w:4.8,h:0.9,fontSize:28,color:C.WHITE,fontFace:F,bold:true,valign:'middle'});
    sl.addShape(pres.shapes.LINE,{x:0.35,y:2.38,w:2.8,h:0,line:{color:C.BLUE,width:1.5}});
    sl.addText('採用ピッチ資料',{x:0.35,y:2.52,w:4.8,h:0.55,fontSize:16,color:'8AB8D8',fontFace:F,valign:'middle'});
    if(url)sl.addText(url,{x:0.35,y:3.22,w:4.5,h:0.32,fontSize:10,color:'5A90B0',fontFace:F});
    sl.addText('© '+cn,{x:0.35,y:5.22,w:4,h:0.28,fontSize:8,color:'3A6080',fontFace:F});}

  // ── 2. 目次 ──
  {const sl=pres.addSlide();sl.background={color:C.WHITE};
    hdr(sl,'','目次');
    ['会社概要','組織','事業紹介','評価・報酬制度','カルチャー','働き方・制度'].forEach((s,i)=>{
      const y=0.72+i*0.72;
      sl.addShape(pres.shapes.RECTANGLE,{x:0.35,y:y+0.1,w:0.34,h:0.34,fill:{color:C.BLUE},line:{color:C.BLUE}});
      sl.addText(String(i+1).padStart(2,'0'),{x:0.35,y:y+0.1,w:0.34,h:0.34,fontSize:9,color:C.WHITE,fontFace:F,bold:true,align:'center',valign:'middle'});
      sl.addText(s,{x:0.88,y,w:8.5,h:0.52,fontSize:17,color:C.TEXT,fontFace:F,valign:'middle'});
      if(i<5)sl.addShape(pres.shapes.LINE,{x:0.35,y:y+0.57,w:9.3,h:0,line:{color:C.BORDER,width:0.5}});
    });}

  sec(1,'会社概要');

  // ── 4. 会社概要 ──
  {const sl=pres.addSlide();sl.background={color:C.WHITE};hdr(sl,'01','会社概要');
    const rows=[['社名',e.companyName],['所在地',e.address],['代表者',e.ceo],['設立',e.founded],['従業員',e.employees],['売上高',e.sales],['事業内容',e.business],['HP',url]].filter(r=>r[1]);
    rows.forEach(([k,v],i)=>{const y=0.66+i*0.54;
      sl.addText(k,{x:0.35,y,w:1.3,h:0.44,fontSize:10,color:C.GRAY,fontFace:F,valign:'middle'});
      sl.addText(v,{x:1.8,y,w:4.8,h:0.44,fontSize:11,color:C.TEXT,fontFace:F,valign:'middle'});
      sl.addShape(pres.shapes.LINE,{x:0.35,y:y+0.44,w:6.3,h:0,line:{color:C.BORDER,width:0.5}});});
    img(sl,'company',6.85,0.6,2.85,4.7);ftr(sl,4);}

  // ── 5. ミッション（ダーク） ──
  {const sl=pres.addSlide();sl.background={color:C.NAVY};
    sl.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:0.07,h:5.625,fill:{color:C.BLUE},line:{color:C.BLUE}});
    sl.addText('MISSION',{x:0.3,y:0.45,w:3,h:0.3,fontSize:9,color:C.BLUE,fontFace:'Arial',bold:true});
    sl.addText(e.mission||'',{x:0.3,y:0.9,w:9.4,h:2.2,fontSize:28,color:C.WHITE,fontFace:F,bold:true,lineSpacingMultiple:1.45});
    if(e.missionEn)sl.addText('"'+e.missionEn+'"',{x:0.3,y:3.05,w:9.2,h:0.42,fontSize:13,color:'6A9CB8',fontFace:'Arial',italic:true});
    sl.addShape(pres.shapes.LINE,{x:0.3,y:3.58,w:2.5,h:0,line:{color:'2A4070',width:1}});
    sl.addText(e.missionDesc||'',{x:0.3,y:3.72,w:9.4,h:1.6,fontSize:11.5,color:'8AAABB',fontFace:F,lineSpacingMultiple:1.7});}

  sec(2,'組織（職種・構成など）');

  // ── 7. 組織 ──
  {const sl=pres.addSlide();sl.background={color:C.BG};hdr(sl,'02','組織');
    const orgCards=[[e.employees,'従業員数'],[e.founded,'設立'],[e.ceo,'代表者']].filter(([n])=>n&&n.trim());
    const leftW=6.7,cardW=orgCards.length<=2?2.8:1.85,cardGap=orgCards.length<=2?0.4:0.28;
    const orgTotalW=orgCards.length*cardW+(orgCards.length-1)*cardGap;
    const orgStartX=(leftW-orgTotalW)/2;
    orgCards.forEach(([n,l],i)=>{const x=orgStartX+i*(cardW+cardGap);
